name: Update terminal SVG

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - scripts/generate-svg.js

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate terminal SVG
        run: node scripts/generate-svg.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- assets/terminal.svg; then
            echo "No changes to commit"
          else
            git add assets/terminal.svg
            git commit -m "chore: update terminal.svg [skip ci]"
            git push
          fi
